<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecuadorian Slang Tranlator | Sebastián Iturralde</title>
    <meta name="description" content="Interactive Ecuadorian Slang Tranlator with authentic expressions, translations, and real-world examples.">
    <meta name="author" content="Sebastián Iturralde">
    <link rel="stylesheet" href="styles/base.css">
    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/responsive-menu.js" defer></script>
    <script src="scripts/main.js" defer></script>
</head>
<body>
    <div class="parent">
        <header class="header">
            <div class="header-top">
                <div class="site-branding">
                    <h1 id="course-title">🇪🇨 Ecuatorian Slang Tranlator</h1>
                    <p class="site-subtitle">Learn real Ecuadorian expressions and how to use them.</p>
                </div>
                <button type="button" id="menu" aria-label="Toggle navigation menu"></button>
            </div>
            <nav class="nav">
                <ul class="navigation">
                    <li><a href="../" title="Coruse Home">Course Home</a></li>
                    <li><a href="index.html" title="Slang Translator" aria-current="page">Slang Translator</a></li>
                    <li><a href="about.html" title="About the Project">About the Project</a></li>
                    <li><a href="add-new.html" title="Add Words">Add Words</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="container">
                <div class="card">
                    <div class="card-header">
                        <span class="phrase-number" id="phraseNumber">Phrase 1 of 1</span>
                    </div>
                    <div id="phraseContent">
                        <div class="phrase-word" id="phraseWord">Ñaño/a</div>
                        <div class="phrase-translation" id="phraseTranslation">Brother/sister or close friend</div>
                        <div class="divider"></div>
                        <div class="phrase">
                            <div class="label">Example:</div>
                            <div class="text" id="phrase">"Oye ñaño, ¿me ayudas con eso?"</div>
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn-primary" id="nextBtn">➜ Next Phrase</button>
                        <button class="btn-secondary" id="resetBtn">↻ Start Over</button>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer">
            <p><span id="currentyear"></span> Sebastián Iturralde | Quito, Ecuador</p>
            <p id="lastModified"></p>
        </footer>
    </div>
    
</body>
</html>
