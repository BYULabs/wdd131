<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album - Sebastián Iturralde</title>
    <meta name="description" content="A collection of photos of temples around the world.">
    <meta name="author" content="Sebastián Iturralde">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script defer src="scripts/temples.js"></script>
    <script defer src="scripts/getdates.js"></script>
</head>
<body>
    <header>
        <p>Temple Album</p>
        <button type="button" id="menu"></button>
        <nav>
            <ul class="navigation">
                <li><a href="#home">Home</a></li>
                <li><a href="#old">Old</a></li>
                <li><a href="#new">New</a></li>
                <li><a href="#large">Large</a></li>
                <li><a href="#small">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Home</h1>
        <div class="gallery">
            <figure class="gallery-item">
                <img src="images/temples/Salt_Lake_Temple,_Utah_-_Sept_2004.jpg" alt="Salt Lake Utah Temple">
                <figcaption>Salt Lake Utah Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/2019_San_Diego_LDS_Temple.jpg" alt="San Diego California Temple">
                <figcaption>San Diego California Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/Washington_D.C._Temple_At_Dusk.jpg" alt="Washington D.C Temple.">

            </figure>
            <figure class="gallery-item">
                <img src="images/temples/LDS_Laie_Hawaii_Temple_front_view.jpg" alt="Laie Hawaii Temple">

            </figure>
            <figure class="gallery-item">
                <img src="images/temples/Cardston_Alberta_Canada_Temple.jpg" alt="Cardston Alberta Temple">

            </figure>
            <figure class="gallery-item">
                <img src="images/temples/RomeTempleatSunset.jpg" alt="Rome Italy Temple">

            </figure>

                <img src="images/temples/New_Nauvoo_Temple_cropped.JPG" alt="Nauvoo Illinois Temple">

            </figure>
            <figure class="gallery-item">
                <img src="images/temples/Mexico_city_temple_night.jpg" alt="Mexico City Mexico Temple">
                <figcaption>Mexico City Mexico Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/St._George_Utah_Temple_2023-10-02.jpg" alt="St. George Utah Temple">
                <figcaption>St. George Utah Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer class="footer">
        <p>&copy;<span id="currentyear"></span> Sebastián Iturralde | Quito, Ecuador</p>
