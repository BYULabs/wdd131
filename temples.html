<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album - Sebastián Iturralde</title>
    <meta name="description" content="Explore a beautiful gallery of temple photographs from around the world, including iconic temples in Utah, California, Hawaii, and more.">
    <meta name="author" content="Sebastián Iturralde">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script defer src="scripts/temples.js"></script>
    <script defer src="scripts/getdates.js"></script>
</head>
<body>
    <header>
        <p>Temple Album</p>
        <button type="button" id="menu"></button>
        <nav>
            <ul class="navigation">
                <li><a href="#home">Home</a></li>
                <li><a href="#old">Old</a></li>
                <li><a href="#new">New</a></li>
                <li><a href="#large">Large</a></li>
                <li><a href="#small">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Home</h1>
        <div class="gallery">
            <figure class="gallery-item">
                <img src="images/temples/salt-lake.jpg" alt="Salt Lake Temple with tall white spires in Salt Lake City, Utah">
                <figcaption>Salt Lake Utah Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/san-diego.jpg" alt="San Diego California Temple with white stone exterior and architectural details">
                <figcaption>San Diego California Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/dc-temple.jpg" alt="Washington D.C. Temple illuminated at dusk with dramatic lighting">
                <figcaption>Washington D.C. Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/laie-hawaii.jpg" alt="Laie Hawaii Temple set among tropical landscape and greenery">
                <figcaption>Laie Hawaii Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/cardston.jpg" alt="Cardston Alberta Temple with elegant architectural design in Canada">
                <figcaption>Cardston Alberta Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/rome.jpg" alt="Rome Italy Temple at sunset with warm golden lighting">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/nauvoo.jpg" alt="Nauvoo Illinois Temple, a reconstructed historic temple building">
                <figcaption>Nauvoo Illinois Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/mexico-city.jpg" alt="Mexico City Temple beautifully lit up at night">
                <figcaption>Mexico City Mexico Temple</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="images/temples/st-george.jpg" alt="St. George Utah Temple, the oldest operating temple with classic architecture">
                <figcaption>St. George Utah Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer class="footer">
        <p>&copy;<span id="currentyear"></span> Sebastián Iturralde | Quito, Ecuador</p>
        <p id="lastModified"></p>
    </footer>

</body>
</html>
